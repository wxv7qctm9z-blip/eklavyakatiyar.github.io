<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eklavya Katiyar</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #ffffff;
    --black:   #111111;
    --grey:    #888888;
    --grey2:   #bbbbbb;
    --line:    #e8e8e8;
    --font:    'Geist', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--black);
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 52px;
    animation: fromTop 0.4s ease both;
  }

  .nav-name {
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.02em;
  }

  .nav-links {
    display: flex; gap: 2rem; list-style: none;
    font-size: 0.82rem;
    color: var(--grey);
  }

  .nav-links a { transition: color 0.15s; }
  .nav-links a:hover { color: var(--black); }

  /* WRAP */
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 2rem; }

  /* HOME */
  #homeView { animation: fadeUp 0.4s 0.05s ease both; }

  .page-heading {
    padding: 4rem 0 2.5rem;
    border-bottom: 1px solid var(--line);
  }

  .page-heading h1 {
    font-size: 1.9rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.2;
    margin-bottom: 0.55rem;
  }

  .page-heading p {
    font-size: 0.88rem;
    color: var(--grey);
    line-height: 1.8;
    max-width: 420px;
  }

  /* WIP */
  .wip {
    padding: 5rem 0 8rem;
    display: flex;
    align-items: center;
  }

  .wip-text {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--grey2);
  }

  /* SINGLE POST */
  #postPage { display: none; }
  #postPage.active { display: block; animation: fadeUp 0.3s ease both; }
  #homeView.hidden { display: none; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    margin: 2rem 0 2.5rem;
    font-size: 0.76rem;
    color: var(--grey);
    cursor: pointer;
    transition: color 0.15s;
    user-select: none;
  }

  .back-btn:hover { color: var(--black); }

  .back-arrow {
    width: 18px; height: 18px;
    background: var(--line);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .back-btn:hover .back-arrow { background: #d8d8d8; }

  .post-header {
    padding-bottom: 1.75rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 2rem;
  }

  .post-tag {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 0.6rem;
  }

  .post-header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.25;
    margin-bottom: 0.85rem;
  }

  .post-header-meta {
    font-size: 0.76rem;
    color: var(--grey);
    display: flex; gap: 0.45rem; align-items: center;
  }

  .dot {
    width: 2.5px; height: 2.5px;
    background: var(--grey);
    border-radius: 50%;
    opacity: 0.4;
  }

  .post-body p {
    font-size: 0.97rem;
    line-height: 1.85;
    color: #333;
    margin-bottom: 1.35rem;
  }

  .post-body h2 {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 2.25rem 0 0.8rem;
    color: var(--black);
  }

  .post-body blockquote {
    border-left: 2px solid var(--grey2);
    margin: 1.75rem 0;
    padding: 0.8rem 1.2rem;
    background: #f7f7f7;
    border-radius: 0 8px 8px 0;
    font-size: 0.94rem;
    color: var(--black);
    line-height: 1.7;
  }

  .post-body ul {
    padding-left: 1.2rem;
    margin-bottom: 1.35rem;
  }

  .post-body ul li {
    font-size: 0.97rem;
    line-height: 1.85;
    color: #333;
    margin-bottom: 0.25rem;
  }

  .post-end {
    margin-top: 3rem;
    padding: 1.25rem 0 5rem;
    border-top: 1px solid var(--line);
    font-size: 0.78rem;
    color: var(--grey);
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--line);
    max-width: 640px; margin: 0 auto;
    padding: 1.5rem 2rem;
    font-size: 0.77rem;
    color: var(--grey);
    display: flex; justify-content: space-between;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fromTop {
    from { opacity: 0; transform: translateY(-100%); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 560px) {
    nav { padding: 0 1.25rem; }
    .wrap { padding: 0 1.25rem; }
    .page-heading h1 { font-size: 1.55rem; }
    .nav-links { display: none; }
    .wip-text { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<nav>
  <span class="nav-name" onclick="goHome()">Eklavya Katiyar</span>
  <ul class="nav-links">
    <li><a href="#" onclick="goHome(); return false;">Home</a></li>
    <li><a href="#">Projects</a></li>
    <li><a href="#">About</a></li>
  </ul>
</nav>

<div id="homeView">
  <div class="wrap">
    <div class="page-heading">
      <h1>Documenting the journey.</h1>
      <p>Ideas, case studies, and things I'm figuring out — mostly around data, AI and how business works.</p>
    </div>

    <div class="wip">
      <span class="wip-text">WORK IN PROGRESS.........</span>
    </div>
  </div>

  <footer>
    <span>Eklavya Katiyar · 2026</span>
    <span>Built with HTML</span>
  </footer>
</div>

<div id="postPage">
  <div class="wrap">
    <div class="back-btn" onclick="goHome()">
      <span class="back-arrow">
        <svg width="6" height="10" viewBox="0 0 6 10" fill="none">
          <path d="M5 1L1 5L5 9" stroke="#888" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      Back
    </div>
    <div class="post-header">
      <div class="post-tag" id="pTag"></div>
      <h1 id="pTitle"></h1>
      <div class="post-header-meta">
        <span id="pDate"></span>
        <span class="dot"></span>
        <span id="pRead"></span>
      </div>
    </div>
    <div class="post-body" id="pBody"></div>
    <div class="post-end">Thanks for reading.</div>
  </div>
</div>

<script>
const posts = [];

function goHome() {
  document.getElementById('homeView').classList.remove('hidden');
  document.getElementById('postPage').classList.remove('active');
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
